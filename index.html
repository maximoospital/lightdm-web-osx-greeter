<html>
  <head>
    <link rel="stylesheet" type="text/css" href="resources/css/style.css" />
    <!-- mock.js is only required for local testing -->
    <script type="text/javascript" src="resources/js/mock.js"></script>
    <script type="text/javascript" src="resources/js/script.js"></script>
  </head>
  <body oncontextmenu="return false;">
    <div class="cover"></div>
    <div class="header">
      <div class="headertext"></div> <!-- you can change this to whatever -->
    </div>
    <div class="time" id="current_time">00:00 AM</div>
    <div id="battery_indicator" class="battery-indicator hidden">
      <div class="battery-icon"><div class="battery-level"></div></div>
      <span class="battery-text"></span>
    </div>
    <div class="login_content">
      <div class="login_container">
        <div class="logo-container">
          <div class="apple-logo"></div>
        </div>
        <div class="center">
          <div id="user_template" class="user button">
            <div class="user_image_wrapper">
              <img class="user_image" src=""/>
            </div>
            <span class="user_name"></span>
          </div>
        </div>
        <div id="password_container" class="pass passhidden passsmooth">
          <form onsubmit="handle_form_submit(); return false;" class="password_prompt">
            <div id="username_field_container" class="hidden">
              <input id="username_entry" type="text" placeholder="Username" autocomplete="off" />
            </div>
            <input id="password_entry" type="password" placeholder="Password" />
            <div id="session_container" class="hidden">
              <div id="session_template">
                <label>
                  <input type="radio" name="session">&nbsp;
                  <span class="session_label"></span>
                </label>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="message" class="smooth">
      <div id="message_content"></div>
    </div>
    <div class="footer">
      <div id="action_suspend" class="action button" onclick="lightdm.suspend();">
        <div class="action_image_wrapper icon-sleep"></div>
        <span class="action_label">Sleep</span>
      </div>
      <div id="action_hibernate" class="action button" onclick="lightdm.hibernate();">
        <div class="action_image_wrapper icon-hibernate"></div>
        <span class="action_label">Hibernate</span>
      </div>
      <div id="action_restart" class="action button" onclick="lightdm.restart();">
        <div class="action_image_wrapper icon-restart"></div>
        <span class="action_label">Restart</span>
      </div>
      <div id="action_shutdown" class="action button" onclick="lightdm.shutdown();">
        <div class="action_image_wrapper icon-shutdown"></div>
        <span class="action_label">Shut Down</span>
      </div>
    </div>
  </body>
</html>
